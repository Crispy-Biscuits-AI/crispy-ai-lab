name: crispy-ai-lab

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    image: adminer:latest
    container_name: ai-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ai-n8n
    restart: unless-stopped
    depends_on:
      - postgres
      - litellm
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: America/Los_Angeles
      OLLAMA_HOST: http://host.docker.internal:11434
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      NODES_EXCLUDE: "[]"
    volumes:
      - n8n_data:/home/node/.n8n
      - /Users/elric/repos/crispy-ai-lab/crispybrain/inbox:/home/node/.n8n-files/crispybrain/inbox
    extra_hosts:
      - "host.docker.internal:host-gateway"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
    volumes:
      - openwebui_data:/app/backend/data

  openclaw:
    image: coollabsio/openclaw:latest
    container_name: ai-openclaw
    restart: unless-stopped
    depends_on:
      - browser
    ports:
      - "8090:8090"
    environment:
      PORT: 8090
      AUTH_USERNAME: ${OPENCLAW_AUTH_USERNAME}
      AUTH_PASSWORD: ${OPENCLAW_AUTH_PASSWORD}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      BROWSER_CDP_URL: http://browser:9222
      BROWSER_DEFAULT_PROFILE: openclaw
      BROWSER_EVALUATE_ENABLED: "true"
    volumes:
      - openclaw_data:/data
      - ./openclaw.json:/app/config/openclaw.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  browser:
    image: coollabsio/openclaw-browser:latest
    container_name: ai-openclaw-browser
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: America/Los_Angeles
      CHROME_CLI: --remote-debugging-port=9222
    volumes:
      - browser_data:/config
    shm_size: 2g

volumes:
  postgres_data:
  qdrant_data:
  n8n_data:
  openwebui_data:
  openclaw_data:
  browser_data:

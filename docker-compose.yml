name: crispy-ai-lab

# Minimum CrispyBrain runtime:
# - n8n for workflow execution
# - Postgres with pgvector for memory storage
# - Ollama is expected to run on the host at host.docker.internal:11434
#   because the exported live workflows currently call that endpoint directly.
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - ai-postgres

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.16.1
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      NODE_FUNCTION_ALLOW_BUILTIN: "*"
      NODES_EXCLUDE: "[]"
    volumes:
      - n8n_data:/home/node/.n8n
      - ../crispybrain/inbox:/home/node/.n8n-files/crispybrain/inbox
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - ai-n8n

  crispybrain-demo-ui:
    build:
      context: ${CRISPYBRAIN_REPO_PATH:-../crispybrain}
      dockerfile: demo/Dockerfile
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "8787:8787"
    environment:
      CRISPYBRAIN_DEMO_HOST: 0.0.0.0
      CRISPYBRAIN_DEMO_PORT: 8787
      CRISPYBRAIN_DEMO_WEBHOOK_URL: http://n8n:5678/webhook/crispybrain-demo
      CRISPYBRAIN_APP_VERSION: ${CRISPYBRAIN_APP_VERSION:-}
    volumes:
      - ../crispybrain/demo:/app/demo
      - ../crispybrain/assets:/app/assets

volumes:
  postgres_data:
  n8n_data:

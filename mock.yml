services:
  postgres:
    image: postgres:16
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: ai_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-lab-net

  redis:
    image: redis:7
    container_name: ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-lab-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai-lab-net

  n8n:
    image: n8nio/n8n:latest
    container_name: ai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ai_lab
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: change_me

      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678

      # n8n can reach Ollama running on the Mac host here:
      OLLAMA_HOST: http://host.docker.internal:11434
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-lab-net

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: ai-openclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      OPENCLAW_NO_RESPAWN: "1"
      NODE_COMPILE_CACHE: /tmp/node-compile-cache

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ai_lab
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: change_me

      REDIS_HOST: redis
      REDIS_PORT: 6379

      OLLAMA_BASE_URL: http://host.docker.internal:11434
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - postgres
      - redis
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ai-lab-net

  adminer:
    image: adminer:latest
    container_name: ai-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - ai-lab-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  n8n_data:

networks:
  ai-lab-net:
    name: ai-lab-net

